# ============================================================
# DSTAIR — Nginx Reverse Proxy Configuration
# For GoDaddy VPS / any Linux VPS
#
# USAGE:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/dstair
#   sudo ln -s /etc/nginx/sites-available/dstair /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain (e.g. dstair.com)
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # --- SSL (Let's Encrypt — run: sudo certbot --nginx -d YOUR_DOMAIN) ---
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Static files served directly by Nginx (much faster than Flask) ---
    location /static/ {
        alias /home/dstair/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- All other requests forwarded to Gunicorn ---
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # --- Security headers (belt-and-suspenders alongside Flask's) ---
    add_header X-Content-Type-Options  "nosniff"     always;
    add_header X-Frame-Options         "SAMEORIGIN"  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # --- File upload size limit (match Flask's MAX_CONTENT_LENGTH) ---
    client_max_body_size 6M;

    # --- Logs ---
    access_log /var/log/nginx/dstair_access.log;
    error_log  /var/log/nginx/dstair_error.log;
}
